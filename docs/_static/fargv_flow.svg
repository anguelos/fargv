<svg width="100%" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#AFA9EC" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <style>
    .zone  { font-family: 'Comic Sans MS', 'Chalkboard SE', cursive; font-size: 15px; font-weight: bold; fill: #3C3489; }
    .label { font-family: 'Comic Sans MS', 'Chalkboard SE', cursive; font-size: 13px; font-weight: bold; }
    .sub   { font-family: ui-monospace, monospace; font-size: 11px; letter-spacing: 0.02em; }
    .hint  { font-family: 'Comic Sans MS', 'Chalkboard SE', cursive; font-size: 11px; fill: #AFA9EC; }
  </style>

  <!-- Zone labels -->
  <text class="zone" x="100" y="18" text-anchor="middle" dominant-baseline="central">What you give</text>
  <text class="zone" x="500" y="18" text-anchor="middle" dominant-baseline="central">What you get</text>

  <!-- Subtle divider -->
  <line x1="200" y1="8" x2="200" y2="192" stroke="#CECBF6" stroke-width="0.5" stroke-dasharray="3 6" opacity="0.5"/>

  <!-- Definition box -->
  <rect x="8" y="74" width="184" height="56" rx="12" fill="#EEEDFE" stroke="#7F77DD" stroke-width="2"/>
  <text class="label" x="100" y="96"  text-anchor="middle" dominant-baseline="central" fill="#3C3489">Your definition</text>
  <text class="sub"   x="100" y="114" text-anchor="middle" dominant-baseline="central" fill="#7F77DD">dict · dataclass · OO</text>

  <!-- Arrow: definition → config -->
  <line x1="192" y1="102" x2="210" y2="102" stroke="#AFA9EC" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- Config box -->
  <rect x="212" y="74" width="150" height="56" rx="12" fill="#C8F5E8" stroke="#1D9E75" stroke-width="1.5"/>
  <text class="label" x="287" y="96"  text-anchor="middle" dominant-baseline="central" fill="#085041">Config file</text>
  <text class="sub"   x="287" y="114" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">JSON · TOML · YAML</text>

  <!-- Arrow: config → env -->
  <line x1="362" y1="102" x2="380" y2="102" stroke="#AFA9EC" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- Env box -->
  <rect x="382" y="74" width="140" height="56" rx="12" fill="#C8F5E8" stroke="#1D9E75" stroke-width="1.5"/>
  <text class="label" x="452" y="96"  text-anchor="middle" dominant-baseline="central" fill="#085041">Env vars</text>
  <text class="sub"   x="452" y="114" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">MY_APP_KEY=…</text>

  <!-- Arrow: env → fork -->
  <line x1="522" y1="102" x2="540" y2="102" stroke="#AFA9EC" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- Fork lines -->
  <path d="M555 102 L555 50 L566 50"   fill="none" stroke="#AFA9EC" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M555 102 L555 102 L566 102" fill="none" stroke="#AFA9EC" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M555 102 L555 154 L566 154" fill="none" stroke="#AFA9EC" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- CLI box -->
  <rect x="568" y="32"  width="224" height="36" rx="12" fill="#FFE0D6" stroke="#D85A30" stroke-width="1.5"/>
  <text class="sub" x="680" y="50"  text-anchor="middle" dominant-baseline="central" fill="#712B13" style="font-size:13px">CLI: --flag value</text>

  <!-- GUI box -->
  <rect x="568" y="84"  width="224" height="36" rx="12" fill="#FFE0D6" stroke="#D85A30" stroke-width="1.5"/>
  <text class="sub" x="680" y="102" text-anchor="middle" dominant-baseline="central" fill="#712B13" style="font-size:13px">GUI: Tk · Qt widget</text>

  <!-- Jupyter box -->
  <rect x="568" y="136" width="224" height="36" rx="12" fill="#FFE0D6" stroke="#D85A30" stroke-width="1.5"/>
  <text class="sub" x="680" y="154" text-anchor="middle" dominant-baseline="central" fill="#712B13" style="font-size:13px">Jupyter: ipywidgets</text>

  <!-- Hint -->
  <text class="hint" x="400" y="186" text-anchor="middle" dominant-baseline="central">← each stage overrides the previous · your definition validates all</text>
</svg>
